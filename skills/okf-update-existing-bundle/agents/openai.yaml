interface:
  display_name: OKF Bundle Updater
  short_description: Refresh an OKF bundle while preserving conventions and logging changes.
  brand_color: "#2F6F5E"
  default_prompt: Update this OKF bundle and add a dated log entry.
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - okf_validate_bundle
    - okf_generate_indexes
    - okf_add_log_entry
