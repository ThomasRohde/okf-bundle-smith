name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate sample bundles (strict)
        run: |
          python tools/okf_tool.py lint examples/minimal-bundle --strict
          python tools/okf_tool.py lint examples/acme-sales-catalog --strict

      - name: Smoke-test visualizer generation
        run: python tools/okf_tool.py visualize examples/acme-sales-catalog -o /tmp/viz.html

      - name: Manifest sanity check
        run: python tools/check_manifest.py
